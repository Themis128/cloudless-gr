name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deploys

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies        run: npm ci

      - name: Build
        run: npx next build
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      # Amplify Hosting handles both:
      #   - Static assets via S3 + CloudFront (your frontend)
      #   - API routes via Lambda (your Stripe backend)
      # Amplify auto-detects Next.js and configures both layers.
      - name: Deploy to Amplify Hosting
        uses: aws-actions/aws-amplify-deploy@v1
        with:
          app-id: ${{ secrets.AMPLIFY_APP_ID }}
          branch-name: main
          wait-for-completion: true

      - name: Deployment summary
        run: |          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend (static pages) → S3 + CloudFront" >> $GITHUB_STEP_SUMMARY
          echo "- Backend (API routes) → Amplify / Lambda" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** [https://cloudless.gr](https://cloudless.gr)" >> $GITHUB_STEP_SUMMARY