name: Lighthouse Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Performance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npx next build

      - name: Serve static site        run: npx serve out -l 3000 &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse on key pages
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/services
            http://localhost:3000/blog
            http://localhost:3000/contact
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .github/lighthouse/lighthouserc.json

      - name: Format Lighthouse Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            // Find the manifest
            const resultsDir = '.lighthouseci';
            if (!fs.existsSync(resultsDir)) {
              console.log('No Lighthouse results found');
              return;
            }

            const manifest = JSON.parse(
              fs.readFileSync(path.join(resultsDir, 'manifest.json'), 'utf8')
            );

            let comment = '## Lighthouse Performance Report\n\n';
            comment += '| Page | Performance | Accessibility | Best Practices | SEO |\n';
            comment += '|------|:-----------:|:------------:|:--------------:|:---:|\n';

            for (const entry of manifest) {
              const result = JSON.parse(fs.readFileSync(entry.jsonPath, 'utf8'));
              const url = new URL(result.finalUrl || result.requestedUrl);
              const page = url.pathname === '/' ? 'Home' : url.pathname.slice(1);
              const perf = Math.round(result.categories.performance.score * 100);
              const a11y = Math.round(result.categories.accessibility.score * 100);
              const bp = Math.round(result.categories['best-practices'].score * 100);
              const seo = Math.round(result.categories.seo.score * 100);
              const emoji = (s) => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';

              comment += `| ${page} | ${emoji(perf)} ${perf} | ${emoji(a11y)} ${a11y} | ${emoji(bp)} ${bp} | ${emoji(seo)} ${seo} |\n`;
            }

            if (context.issue.number) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

            // Also write to step summary
            const summaryFile = process.env.GITHUB_STEP_SUMMARY;
            fs.appendFileSync(summaryFile, comment);