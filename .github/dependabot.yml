version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Athens
    open-pull-requests-limit: 5
    reviewers:
      - Themis128
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      # Group minor/patch updates to reduce PR noise
      next-ecosystem:
        patterns:
          - "next"
          - "eslint*"
          - "@next/*"
        update-types:
          - minor          - patch
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Athens
    open-pull-requests-limit: 3
    reviewers:
      - Themis128
    labels:
      - ci
      - automated
    commit-message:
      prefix: "ci"